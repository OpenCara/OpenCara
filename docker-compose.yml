services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: opencara_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: opencara
      POSTGRES_PASSWORD: opencara
      POSTGRES_DB: opencara
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - opencara_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencara -d opencara"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  opencara_db_data:

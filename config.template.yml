# OpenCara CLI Configuration Template
# ====================================
#
# This file configures the OpenCara CLI agent. Place it at:
#   ~/.opencara/config.yml
#
# Created automatically by `opencara login`. You can edit it manually
# to add agents, set limits, or configure repo filtering.
#
# File permissions are set to 0600 (owner-only) since it contains your API key.

# ---------------------------------------------------------------------------
# CONNECTION
# ---------------------------------------------------------------------------

# Platform URL — the OpenCara worker endpoint.
# Set automatically by `opencara login`.
platform_url: https://opencara-server.opencara.workers.dev

# Your API key — set automatically by `opencara login`.
# This authenticates your CLI with the platform. Never share this key.
# api_key: cr_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# ---------------------------------------------------------------------------
# GITHUB TOKEN (optional)
# ---------------------------------------------------------------------------
#
# A GitHub personal access token for fetching diffs from private repos.
# Use a fine-grained PAT with "Contents: Read" permission.
# This is the global token — per-agent tokens override it (see below).
# Without a token, agents can only review public repos.

# github_token: ghp_your_token_here

# ---------------------------------------------------------------------------
# AGENTS
# ---------------------------------------------------------------------------
#
# Define one or more AI agents that review PRs on your behalf.
# Each agent needs a model name, tool identifier, and a command template
# that the CLI executes locally to produce reviews.
#
# Command templates:
#   The review prompt is delivered via stdin to the command.
#   Do NOT use ${PROMPT} in commands — stdin avoids OS arg size limits.
#   ${MODEL} is supported but optional if you hardcode the model name.
#
# All AI calls happen locally — your API keys never leave your machine.
#
# Agent fields:
#   model         (required) — AI model identifier
#   tool          (required) — AI tool identifier
#   command       (required) — Shell command for reviews (stdin→stdout)
#   name          (optional) — Display name in CLI logs (local only)
#   review_only   (optional) — If true, agent only reviews, never synthesizes
#   github_token  (optional) — Per-agent GitHub token (overrides global)
#   router        (optional) — If true, runs in router mode (stdin/stdout relay)
#   repos         (optional) — Repo filtering config
#   limits        (optional) — Per-agent consumption limits

agents:
  # Claude (Anthropic)
  - model: claude-sonnet-4-6
    tool: claude-code
    command: claude --model claude-sonnet-4-6 --allowedTools '*' --print

  # Qwen-compatible models (Alibaba Cloud)
  - model: qwen3.5-plus
    tool: qwen
    command: qwen --model qwen3.5-plus -y

  # - model: glm-5
  #   tool: qwen
  #   command: qwen --model glm-5 -y

  # - model: kimi-k2.5
  #   tool: qwen
  #   command: qwen --model kimi-k2.5 -y

  # Codex (OpenAI)
  # - model: gpt-5.4-codex
  #   tool: codex
  #   command: codex --model gpt-5.4-codex exec

  # Gemini (Google)
  # - model: gemini-2.5-pro
  #   tool: gemini
  #   command: gemini -m gemini-2.5-pro

  # Full example with all optional fields:
  # - model: claude-sonnet-4-6
  #   tool: claude-code
  #   name: My Claude Reviewer
  #   command: claude --model claude-sonnet-4-6 --allowedTools '*' --print
  #   review_only: true              # Only review, never synthesize
  #   github_token: ghp_per_agent    # Override global github_token
  #   repos:
  #     mode: whitelist              # all | own | whitelist | blacklist
  #     list:
  #       - myorg/my-project
  #       - OpenCara/OpenCara
  #   limits:
  #     tokens_per_day: 50000
  #     tokens_per_month: 500000
  #     reviews_per_day: 10

# ---------------------------------------------------------------------------
# GLOBAL LIMITS (optional)
# ---------------------------------------------------------------------------
#
# Global consumption limits applied to all agents unless overridden
# by per-agent limits. Enforced locally by the CLI — the platform
# never sees your token counts.

# limits:
#   tokens_per_day: 100000
#   tokens_per_month: 1000000
#   reviews_per_day: 20

# ---------------------------------------------------------------------------
# ADVANCED (optional)
# ---------------------------------------------------------------------------

# Default command template for agents that don't specify their own.
# Prompt is delivered via stdin. ${MODEL} is optional.
# agent_command: claude --model ${MODEL} --allowedTools '*' --print

# Maximum PR diff size in KB. PRs larger than this are skipped.
# Default: 100
# max_diff_size_kb: 100

# Codebase context: clone repos locally for context-aware reviews.
# When set, the CLI shallow-clones repos and runs tool commands from within
# the local checkout. The tool command's cwd is set automatically.
# codebase_dir: ~/.opencara/repos

# ---------------------------------------------------------------------------
# ANONYMOUS AGENTS (managed by CLI, do not edit manually)
# ---------------------------------------------------------------------------
#
# When you run `opencara agent start` without logging in, the CLI
# registers an anonymous agent and stores its credentials here.
# After `opencara login`, you can link anonymous agents to your account.
#
# anonymous_agents:
#   - agent_id: 3712d31f-200e-41cd-b9bd-7dc4df40cdf6
#     api_key: cr_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
#     model: claude-sonnet-4-6
#     tool: claude
#     repo_config:
#       mode: all

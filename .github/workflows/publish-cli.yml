name: Auto version bump and publish

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  bump-and-publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Determine bump type
        id: bump
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ inputs.bump_type }}" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${{ github.event.pull_request.head.ref }}"
            if [[ "$BRANCH" == feat/* ]] || [[ "$BRANCH" == improve/* ]] || [[ "$BRANCH" == feature/* ]]; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
            elif [[ "$BRANCH" == fix/* ]] || [[ "$BRANCH" == bugfix/* ]]; then
              echo "type=patch" >> "$GITHUB_OUTPUT"
            elif [[ "$BRANCH" == breaking/* ]] || [[ "$BRANCH" == major/* ]]; then
              echo "type=major" >> "$GITHUB_OUTPUT"
            else
              echo "type=none" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Skip if no bump needed
        if: steps.bump.outputs.type == 'none'
        run: echo "No version bump for this branch prefix. Skipping."
      - uses: pnpm/action-setup@v4
        if: steps.bump.outputs.type != 'none'
      - uses: actions/setup-node@v4
        if: steps.bump.outputs.type != 'none'
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for OIDC trusted publishing support
        if: steps.bump.outputs.type != 'none'
        run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
        if: steps.bump.outputs.type != 'none'
      - run: pnpm build
        if: steps.bump.outputs.type != 'none'
      - run: pnpm test
        if: steps.bump.outputs.type != 'none'
      - name: Bump CLI version
        if: steps.bump.outputs.type != 'none'
        id: version
        working-directory: packages/cli
        run: |
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "new=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Publish opencara CLI
        if: steps.bump.outputs.type != 'none'
        working-directory: packages/cli
        run: npm publish --access public --provenance
      - name: Commit version bump and create release
        if: steps.bump.outputs.type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/cli/package.json
          git commit -m "Bump version to ${{ steps.version.outputs.new }}"
          git push
          gh release create "v${{ steps.version.outputs.new }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

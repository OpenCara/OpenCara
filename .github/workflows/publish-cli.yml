name: Publish CLI

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for OIDC trusted publishing support
        run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - name: Set CLI version from tag
        working-directory: packages/cli
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version
      - run: pnpm build
      - run: pnpm test
      - name: Publish opencara CLI
        working-directory: packages/cli
        run: npm publish --access public --provenance
      - name: Create GitHub release
        run: gh release create "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-prod:
    needs: publish
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Inject infrastructure IDs
        run: |
          sed -i "s/REPLACE_WITH_PROD_D1_DATABASE_ID/${{ secrets.CF_PROD_D1_ID }}/" packages/server/wrangler.toml
          sed -i "s/REPLACE_WITH_KV_NAMESPACE_ID/${{ secrets.CF_PROD_KV_ID }}/" packages/server/wrangler.toml
      - name: Run D1 migrations
        run: pnpm exec wrangler d1 migrations apply opencara-db --remote
        working-directory: packages/server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy prod worker
        run: pnpm exec wrangler deploy
        working-directory: packages/server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

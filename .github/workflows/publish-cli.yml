name: Publish CLI

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for OIDC trusted publishing support
        run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - name: Set CLI version from tag
        working-directory: packages/cli
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version
      - run: pnpm build
      - run: pnpm test
      - name: Publish opencara CLI
        working-directory: packages/cli
        run: npm publish --access public --provenance

  deploy-prod:
    needs: publish
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    outputs:
      version_id: ${{ steps.upload.outputs.version_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Set server version from tag
        run: sed -i "s/SERVER_VERSION = '.*'/SERVER_VERSION = '${{ steps.version.outputs.version }}'/" packages/server/src/version.ts
      - run: pnpm build
      - name: Inject infrastructure IDs
        run: |
          sed -i "s/REPLACE_WITH_PROD_D1_DATABASE_ID/${{ secrets.CF_PROD_D1_ID }}/" packages/server/wrangler.toml
      - name: Run D1 migrations
        run: pnpm exec wrangler d1 migrations apply opencara-db --remote
        working-directory: packages/server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Upload new version
        id: upload
        working-directory: packages/server
        run: |
          OUTPUT="$(pnpm exec wrangler versions upload 2>&1)"
          echo "$OUTPUT"
          VERSION_ID="$(echo "$OUTPUT" | grep -oP '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}' | tail -1 || true)"
          if [ -z "$VERSION_ID" ]; then
            echo "ERROR: Failed to extract version ID from wrangler output"
            exit 1
          fi
          echo "version_id=${VERSION_ID}" >> "$GITHUB_OUTPUT"
          echo "Uploaded version: ${VERSION_ID}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy version to 100% traffic
        working-directory: packages/server
        run: pnpm exec wrangler versions deploy "${{ steps.upload.outputs.version_id }}@100%" --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Verify deployment
        run: |
          sleep 5
          RESPONSE="$(curl -sf --max-time 10 https://opencara-server.opencara.workers.dev/api/meta || true)"
          if echo "$RESPONSE" | grep -q '"server_version"'; then
            echo "Deployment verified: ${RESPONSE}"
          else
            echo "WARNING: Could not verify deployment — check manually"
          fi

  check-docs-changed:
    needs: publish
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if docs changed since last tag
        id: check
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$PREV_TAG" HEAD -- docs/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-docs:
    needs: check-docs-changed
    if: ${{ needs.check-docs-changed.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build docs
        working-directory: docs
        run: pnpm build
      - name: Deploy to Cloudflare Pages
        working-directory: packages/server
        run: pnpm exec wrangler pages deploy ../../docs/dist --project-name opencara-web --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  create-release:
    needs: [publish, deploy-prod]
    if: ${{ needs.deploy-prod.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        run: gh release create "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

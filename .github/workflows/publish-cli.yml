name: publish-cli

# Publish the `opencara` CLI to npm whenever a `v<semver>` tag lands on
# main. Authentication is npm trusted publishing (GitHub OIDC) — the
# workflow's `id-token: write` permission lets pnpm exchange a GitHub
# OIDC token for an npm publish token at registry.npmjs.org. No
# NPM_TOKEN secret is needed; rotate the trusted publisher config at
# https://www.npmjs.com/package/opencara/access if the (org, repo,
# workflow file, environment) tuple ever changes.
#
# `@opencara/shared` is bundled into dist/bin.js by esbuild at build
# time, so the published package has no workspace deps and `npm i -g
# opencara` resolves cleanly.
#
# Tag a release:
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish opencara
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm trusted publishing + provenance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history for the ancestry check

      - name: Verify tag is on main
        # Tags can be pushed to any commit; only publish when the tagged
        # commit is reachable from main, so a feature-branch tag never ships.
        run: |
          git fetch origin main --depth=200
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag commit ${GITHUB_SHA} is not on main."
            echo "Tag a commit that exists on main, then push the tag."
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Build (tsc + esbuild bundle)
        # `tsc -b` typechecks via project refs (builds @opencara/shared
        # then opencara). `node build.mjs` then bundles src/bin.ts → a
        # single dist/bin.js with @opencara/shared inlined.
        run: pnpm --filter opencara build

      - name: Set version from tag
        # v1.2.3 → 1.2.3. Pre-release suffixes (v1.2.3-rc.1) are fine.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' must be v<semver>; got '$VERSION'"
            exit 1
          fi
          echo "Publishing opencara@$VERSION"
          (cd packages/cli && npm version "$VERSION" --no-git-tag-version --allow-same-version)

      - name: Publish opencara
        working-directory: packages/cli
        # No NODE_AUTH_TOKEN: `--provenance` triggers npm's trusted-
        # publishing flow, which uses the workflow's OIDC token. If the
        # registry rejects with "configured trusted publisher", the
        # workflow file path or repo doesn't match what's set up at
        # https://www.npmjs.com/package/opencara/access.
        run: pnpm publish --provenance --no-git-checks

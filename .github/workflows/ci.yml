name: ci

# Required status check for PRs to OpenCara/OpenCara — the repo's
# branch-protection rule wants a check literally named `ci` to land
# before main moves. Typecheck + tests + build; the test suite is
# node:test with no external infra, so it adds ~15s, not minutes.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Don't pile up CI runs on a busy PR; cancel the older ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Reads pnpm version from root package.json's `packageManager`
        # field; specifying it here too errors out (pnpm/action-setup
        # guards against drift).

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        # node:test via tsx — no DB or other infra required. Packages
        # without a `test` script (web, flows, shared) are skipped.
        run: pnpm -r test

      - name: Build
        # Builds every workspace (orchestrator, web, cli, shared,
        # flows). Runs the same `pnpm -r build` the publish workflow
        # would hit, so a CI green here means a tag-push won't break
        # at the build step.
        run: pnpm -r build

# OpenCara Review Configuration
# ==============================
#
# Place this file as `.review.toml` in your repository root to customize
# how OpenCara reviews your PRs.
#
# Only `version` and `prompt` are required — everything else has sensible defaults.
# Works without any `.review.toml` at all — OpenCara uses:
#   1 review agent, trigger on PR opened, skip drafts, 10-minute timeout.
#
# Minimal config:
#   version = 1
#   prompt = "Review this PR for bugs and code quality."
#
# Configuration examples at the end of this file.

# ===========================================================================
# REQUIRED FIELDS
# ===========================================================================

# Schema version — must be 1 (the only supported version).
version = 1

# The review prompt sent to all review agents. This is the primary instruction
# agents receive, so be specific about what matters to your project.
# Use TOML multiline strings (triple quotes) for longer prompts.
#
# Tips:
#   - Mention your tech stack so agents understand the context
#   - List specific things to watch for (security, performance, style)
#   - Mention any project conventions (naming, patterns, test requirements)
prompt = """
Review this PR for bugs, security issues, and code quality.
Focus on logic errors, edge cases, and potential performance problems.
This project uses TypeScript + React, following ESLint standards.
"""

# ===========================================================================
# TRIGGER — when to run reviews
# ===========================================================================
#
# Controls which GitHub events trigger an automatic review.
# All fields are optional and have sensible defaults.
[trigger]

# PR actions that trigger a review. One or more of:
#   opened           — new PR created (default)
#   synchronize      — new commits pushed to an existing PR
#   reopened         — closed PR reopened
#   ready_for_review — draft PR marked as ready
# Default: ["opened"]
on = ["opened", "synchronize"]

# Comment command to manually request a review on any PR.
# Post this text as a PR comment to trigger an on-demand review.
# Both slash-command (/opencara) and @mention (@opencara) forms work.
# Default: "/opencara review"
comment = "/opencara review"

# Conditions to skip reviews automatically. One or more of:
#   draft            — skip draft PRs
#   label:<name>     — skip PRs with this label (e.g., "label:wip")
#   branch:<pattern> — skip PRs from matching source branches (e.g., "branch:release/*")
#                      Supports glob patterns (* matches any characters)
# Default: ["draft"]
skip = ["draft"]
# skip = ["draft", "label:no-review", "branch:release/*", "label:dependencies"]

# ===========================================================================
# AGENTS — control how many agents review and model preferences
# ===========================================================================
#
# Controls the number of review agents and which models/tools are preferred.
# All fields are optional.
[agents]

# Number of agents to review each PR (range: 1–10).
# When review_count = 1: the single agent's review is posted directly.
# When review_count > 1: individual reviews are collected, then a synthesizer
#   agent merges them into a single consolidated comment with:
#   - Per-reviewer sections with attribution
#   - Severity-tagged findings with file:line references
#   - An overall verdict (approve, comment, or request_changes)
# Default: 1
review_count = 2

# Prefer agents running these AI models (empty = no preference).
# Matching agents are selected first when claiming review slots;
# non-matching agents fill remaining slots if not enough preferred agents respond.
# Model names must match what agents report (e.g., "claude-sonnet-4-6").
# See available models: GET /api/registry
# Default: []
preferred_models = ["claude-sonnet-4-6", "qwen3.5-plus"]
# preferred_models = ["glm-5", "kimi-k2.5", "gpt-5.4-codex", "gemini-2.5-pro"]

# Prefer agents using these tool types (empty = no preference).
# Tool names: claude, codex, gemini, qwen
# Default: []
preferred_tools = []
# preferred_tools = ["claude", "qwen"]

# ===========================================================================
# REVIEWER — control who can review
# ===========================================================================
#
# Access control for which agents/users are allowed to review PRs in this repo.
# All fields are optional. By default, all authenticated agents can review.
[reviewer]

# Whitelist: allow ONLY these users/agents to review.
# When set, no other agents can claim review tasks for this repo.
# Identify by GitHub username or agent ID.
# Default: [] (empty = allow all authenticated agents)
#
# [[reviewer.whitelist]]
# github = "trusted-contributor"     # GitHub username
#
# [[reviewer.whitelist]]
# agent = "3712d31f-..."             # Specific agent ID

# Blacklist: block specific users/agents from reviewing.
# These agents cannot claim review tasks for this repo.
# Default: []
#
# [[reviewer.blacklist]]
# github = "unreliable-reviewer"

# ===========================================================================
# SUMMARIZER — control who produces the synthesis
# ===========================================================================
#
# When review_count > 1, a synthesizer agent consolidates individual reviews
# into a single merged comment posted to the PR. Use these fields to control
# which agents are eligible for summarization.
#
# Supports three forms:
#
# 1. String shorthand — set a preferred summarizer by GitHub username:
#    summarizer = "alice"
#    → equivalent to: [summarizer] preferred = [{ github = "alice" }]
#
# 2. Object with "only" — restrict summarization to specific users:
#    [summarizer]
#    only = "alice"
#    → equivalent to: [summarizer] whitelist = [{ github = "alice" }]
#
#    [summarizer]
#    only = ["alice", "bob"]
#    → equivalent to: [summarizer] whitelist = [{ github = "alice" }, { github = "bob" }]
#
# 3. Full object — explicit whitelist/blacklist/preferred lists:
[summarizer]
# [[summarizer.whitelist]]
# github = "dedicated-summarizer"
#
# [[summarizer.blacklist]]
# github = "review-only-user"
#
# [[summarizer.preferred]]
# github = "best-summarizer"

# ===========================================================================
# TIMEOUT — max wait time for reviews
# ===========================================================================

# How long to wait for all review slots to be filled before synthesizing.
# If not all review_count agents respond within this window, the synthesizer
# proceeds with whatever reviews have been submitted.
# Format: "<minutes>m" (range: 1m–30m)
# Default: "10m"
timeout = "10m"

# ===========================================================================
# CONFIGURATION EXAMPLES
# ===========================================================================
#
# --- Example 1: Single agent, minimal config ---
#
#   version = 1
#   prompt = "Review for bugs and security issues."
#
# --- Example 2: Multi-agent with model preferences ---
#
#   version = 1
#   prompt = """
#   Review this PR for our Python/Django backend.
#   Focus on SQL injection, authentication bypass, and N+1 queries.
#   """
#   [trigger]
#   on = ["opened", "synchronize"]
#   skip = ["draft", "label:dependencies"]
#   [agents]
#   review_count = 3
#   preferred_models = ["claude-sonnet-4-6", "gpt-5.4-codex", "gemini-2.5-pro"]
#   timeout = "15m"
#
# --- Example 3: Restricted access with dedicated summarizer ---
#
#   version = 1
#   prompt = "Security-focused review for our payment service."
#   [agents]
#   review_count = 2
#   [[reviewer.whitelist]]
#   github = "security-team-member-1"
#   [[reviewer.whitelist]]
#   github = "security-team-member-2"
#   [summarizer]
#   only = "security-team-lead"
#   timeout = "5m"
#
# --- Example 4: Review on every push, no drafts, custom trigger ---
#
#   version = 1
#   prompt = "Quick check for obvious bugs. Be concise."
#   [trigger]
#   on = ["opened", "synchronize", "ready_for_review"]
#   comment = "/review please"
#   skip = ["draft", "label:wip", "branch:release/*"]
#   [agents]
#   review_count = 1
#   timeout = "5m"

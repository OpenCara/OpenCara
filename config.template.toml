# OpenCara CLI Configuration
# ==========================
#
# This file configures the OpenCara CLI agent runtime. Place it at:
#   ~/.opencara/config.toml
#
# Created automatically by `opencara login`. You can also create or edit
# it manually. File permissions are set to 0600 (owner-only read/write).
#
# Override the config file location with: OPENCARA_CONFIG=/path/to/config.toml
# Override the platform URL with:         OPENCARA_PLATFORM_URL=https://...
#
# Minimal config (just 1 agent):
#   platform_url = "https://opencara-server.opencara.workers.dev"
#   [[agents]]
#   model = "claude-sonnet-4-6"
#   tool = "claude"
#   command = "claude --model claude-sonnet-4-6 --allowedTools '*' --print"

# ===========================================================================
# CONNECTION
# ===========================================================================

# Platform URL — the OpenCara server endpoint your agents poll for tasks.
# Set automatically by `opencara login`.
# Can be overridden with OPENCARA_PLATFORM_URL environment variable.
platform_url = "https://opencara-server.opencara.workers.dev"

# ===========================================================================
# AGENTS
# ===========================================================================
#
# Define one or more AI agents that review PRs on your behalf. Each agent
# polls the platform for tasks and executes reviews locally using your
# own API keys — keys never leave your machine.
#
# Required fields per agent:
#   model    — AI model identifier (e.g., "claude-sonnet-4-6", "qwen3.5-plus")
#   tool     — Tool name from the registry (claude, codex, gemini, qwen)
#
# Optional fields per agent:
#   command          — Shell command that receives the review prompt via stdin
#                      and writes the review to stdout. If omitted, the global
#                      agent_command is used (see ADVANCED section).
#                      Do NOT use ${PROMPT} — prompt is always delivered via stdin
#                      to avoid OS argument size limits. ${MODEL} is supported.
#   name             — Display name in CLI logs (local only, not sent to platform)
#   thinking         — Thinking/reasoning level hint (e.g., "high", "medium", "1024")
#                      Passed to the platform as metadata, not used by the CLI directly.
#   review_only      — If true, this agent only reviews PRs, never synthesizes.
#                      Use when you want an agent to contribute reviews but never
#                      produce the final merged summary. Default: false
#   synthesizer_only — If true, this agent only synthesizes, never reviews.
#                      Use for a dedicated summarizer agent. Default: false
#                      Cannot be true at the same time as review_only.
#   router           — If true, runs in router mode (stdin/stdout relay for use
#                      as a sub-tool inside another AI agent). Default: false
#   codebase_dir     — Per-agent override for codebase clone directory.
#                      Overrides the global codebase_dir (see ADVANCED section).
#                      Supports ~ for home directory. Example: "~/.opencara/repos"
#
# Deprecated fields (still parsed but produce warnings):
#   github_token     — Per-agent GitHub token. Deprecated: use `opencara auth login`.

# --- Claude (Anthropic) ---
# Uses the `claude` CLI tool. Requires ANTHROPIC_API_KEY in your environment.
[[agents]]
model = "claude-sonnet-4-6"
tool = "claude"
command = "claude --model claude-sonnet-4-6 --allowedTools '*' --print"

# --- Qwen-compatible models (Alibaba Cloud) ---
# The `qwen` CLI supports multiple models including Qwen, GLM, Kimi, and MiniMax.
# Requires DASHSCOPE_API_KEY or provider-specific keys in your environment.
[[agents]]
model = "qwen3.5-plus"
tool = "qwen"
command = "qwen --model qwen3.5-plus -y"


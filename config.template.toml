# --- Full example with all optional fields ---
# [[agents]]
# model = "claude-sonnet-4-6"
# tool = "claude"
# name = "My Claude Reviewer"
# command = "claude --model claude-sonnet-4-6 --allowedTools '*' --print"
# thinking = "high"
# review_only = true
# codebase_dir = "~/.opencara/repos/claude"
#
# # Repo filtering: control which repos this agent reviews
# [agents.repos]
# mode = "whitelist"                # all | own | whitelist | blacklist
# list = ["myorg/my-project"]       # Required for whitelist/blacklist modes
#
# # Synthesize repo filtering: control which repos this agent can synthesize for
# # (only relevant when synthesizer_only = false and review_only = false)
# [agents.synthesize_repos]
# mode = "all"

# ===========================================================================
# REPO FILTERING
# ===========================================================================
#
# Each agent can have a [agents.repos] section to control which repos it reviews.
# Without repo filtering, agents review all repos they're eligible for.
#
# Modes:
#   all       — Review all repos (default)
#   own       — Only review repos owned by the authenticated GitHub user
#   whitelist — Only review repos in the list
#   blacklist — Review all repos EXCEPT those in the list
#
# The `list` field is required for whitelist and blacklist modes.
# Each entry must be in "owner/repo" format.
#
# Example — only review two specific repos:
# [agents.repos]
# mode = "whitelist"
# list = ["myorg/backend", "myorg/frontend"]
#
# Example — review everything except forks:
# [agents.repos]
# mode = "blacklist"
# list = ["thirdparty/forked-lib"]

# ===========================================================================
# USAGE LIMITS (optional)
# ===========================================================================
#
# Cap how many reviews and tokens your agents consume per day.
# Limits are enforced locally — the platform is not aware of them.
# When a limit is reached, the agent skips tasks until the next day (UTC).
# Omit or set to 0 for unlimited.

# Maximum number of reviews per day across all agents.
# max_reviews_per_day = 50

# Maximum total tokens per day across all agents.
# max_tokens_per_day = 1000000

# Maximum tokens per individual review (rejects oversized tasks).
# max_tokens_per_review = 50000

# ===========================================================================
# ADVANCED (optional)
# ===========================================================================

# Default command template for agents that don't specify their own.
# Prompt is delivered via stdin. ${MODEL} is replaced with the agent's model name.
# agent_command = "claude --model ${MODEL} --allowedTools '*' --print"

# Maximum PR diff size in KB. Diffs larger than this are skipped.
# Increase this if you work on repos with large generated files.
# Default: 100
# max_diff_size_kb = 100

# Maximum consecutive poll errors before the agent shuts down.
# Prevents infinite loops when the platform is unreachable.
# Default: 10
# max_consecutive_errors = 10

# Codebase context: clone repos locally for context-aware reviews.
# When set, the CLI shallow-clones repos using `gh repo clone` and runs
# tool commands from within the local checkout (cwd set automatically).
# This gives the AI tool access to the full codebase, not just the diff.
# Supports ~ for home directory.
# Requires `gh` CLI authenticated (`gh auth login`).
# codebase_dir = "~/.opencara/repos"


name = "opencara-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Secrets (set via `wrangler secret put <NAME>`):
# - GITHUB_WEBHOOK_SECRET: GitHub App webhook secret
# - GITHUB_APP_ID: GitHub App ID
# - GITHUB_APP_PRIVATE_KEY: GitHub App private key (PEM)
# - GITHUB_CLIENT_ID: GitHub App client ID
# - GITHUB_CLIENT_SECRET: GitHub App client secret

[vars]
WEB_URL = "https://opencara.com"
WORKER_URL = "https://api.opencara.com"

[durable_objects]
bindings = [
  { name = "AGENT_CONNECTION", class_name = "AgentConnection" },
  { name = "TASK_TIMEOUT", class_name = "TaskTimeout" }
]

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "TBD_RATE_LIMIT_KV_ID"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentConnection", "TaskTimeout"]

# ── Dev environment ──────────────────────────────────────────────
[env.dev]
name = "opencara-worker-dev"

[env.dev.vars]
WEB_URL = "https://dev.opencara.com"
WORKER_URL = "https://opencara-worker-dev.opencara.workers.dev"

[env.dev.durable_objects]
bindings = [
  { name = "AGENT_CONNECTION", class_name = "AgentConnection" },
  { name = "TASK_TIMEOUT", class_name = "TaskTimeout" }
]

[[env.dev.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "98488948567340099887f541ba94e3c8"

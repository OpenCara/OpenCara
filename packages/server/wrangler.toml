# Requires wrangler 4.74.0+ for local D1 (SQLite) dev support.
# `wrangler dev` uses local D1 (SQLite) and local KV — no real resource IDs needed.
# `wrangler dev --remote` requires actual Cloudflare resource IDs below.
name = "opencara-server"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Secrets (set via `wrangler secret put <NAME>`):
# - GITHUB_WEBHOOK_SECRET: GitHub App webhook secret
# - GITHUB_APP_ID: GitHub App ID
# - GITHUB_APP_PRIVATE_KEY: GitHub App private key (PEM)

[vars]
WEB_URL = "https://opencara.com"
TASK_TTL_DAYS = "7"

[[kv_namespaces]]
binding = "TASK_STORE"
id = "b6cb6efb2960419ea5a7c6a5a51b4345"

[[d1_databases]]
binding = "DB"
database_name = "opencara-db"
database_id = "1c036871-fe91-47e4-8132-761fbcad65d0"
migrations_dir = "migrations"

[triggers]
crons = ["* * * * *"]  # Every minute — checks for timed-out tasks

# ── Dev environment ──────────────────────────────────────────────
[env.dev]
name = "opencara-server-dev"

[env.dev.vars]
WEB_URL = "https://dev.opencara.com"
TASK_TTL_DAYS = "7"

[[env.dev.kv_namespaces]]
binding = "TASK_STORE"
id = "8b056c1e0a884c48a63111a583d7a50f"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "opencara-db-dev"
database_id = "3ac626f1-1e17-4373-bf88-31f3eeaa6327"
migrations_dir = "migrations"

[env.dev.triggers]
crons = ["* * * * *"]  # Every minute — checks for timed-out tasks

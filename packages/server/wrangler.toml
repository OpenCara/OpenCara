# Requires wrangler 4.74.0+ for local D1 (SQLite) dev support.
# `wrangler dev` uses local D1 (SQLite) — no real resource IDs needed.
# `wrangler dev --remote` requires actual Cloudflare resource IDs below.
name = "opencara-server"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Secrets (set via `wrangler secret put <NAME>`):
# - GITHUB_WEBHOOK_SECRET: GitHub App webhook secret
# - GITHUB_APP_ID: GitHub App ID
# - GITHUB_APP_PRIVATE_KEY: GitHub App private key (PEM)
# - GITHUB_CLIENT_ID: GitHub App client ID (required for OAuth token verification)
# - GITHUB_CLIENT_SECRET: GitHub App client secret (required for OAuth token verification)

# Infrastructure IDs are injected at deploy time via CI secrets or local overrides.
# See docs/deployment.md for setup instructions.
# To deploy locally, copy wrangler.toml.example or set IDs via env vars.

[vars]
WEB_URL = "https://opencara.com"
TASK_TTL_DAYS = "7"

[[d1_databases]]
binding = "DB"
database_name = "opencara-db"
database_id = "REPLACE_WITH_PROD_D1_DATABASE_ID"
migrations_dir = "migrations"

[triggers]
crons = ["* * * * *"]  # Every minute — checks for timed-out tasks

# ── Dev environment ──────────────────────────────────────────────
[env.dev]
name = "opencara-server-dev"

[env.dev.vars]
WEB_URL = "https://dev.opencara.com"
TASK_TTL_DAYS = "7"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "opencara-db-dev"
database_id = "REPLACE_WITH_DEV_D1_DATABASE_ID"
migrations_dir = "migrations"

[env.dev.triggers]
crons = ["* * * * *"]  # Every minute — checks for timed-out tasks
